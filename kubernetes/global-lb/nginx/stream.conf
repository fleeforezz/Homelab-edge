# Handles cluster death
# TLS passthrough
# No Kubernetes dependency

stream {
    upstream k8s_clusters {
        least_conn;
        server 10.0.0.51:443 max_fails=3 fail_timeout=10s;
        server 10.0.0.52:443 max_fails=3 fail_timeout=10s;
        server 10.0.0.53:443 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 443;
        proxy_connect_timeout 5s;
        proxy_timeout 30s;
        proxy_pass k8s_clusters;
    }
}
